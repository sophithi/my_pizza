[build]
builder = "nixpacks"
buildCommand = "composer install --no-dev --optimize-autoloader && mkdir -p storage/framework/{sessions,views,cache} storage/logs bootstrap/cache && php artisan package:discover --ansi || true"

[deploy]
startCommand = "rm -f .env && CACHE_STORE=file SESSION_DRIVER=file php artisan migrate --force && php artisan db:seed --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=$PORT"
